{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="animate-in"
    style="max-width: 400px; margin: 4rem auto; background: var(--card-bg); padding: 3rem; border-radius: 20px; border: 1px solid var(--glass-border);">
    <h2 style="margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
    <form method="POST">
        {% csrf_token %}
        <div style="margin-bottom: 1.5rem;">
            {{ form.as_p }}
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
    </form>
    <p style="margin-top: 2rem; text-align: center; color: var(--text-muted);">
        Don't have an account? <a href="{% url 'signup' %}" style="color: var(--primary);">Sign up here</a>
    </p>
</div>
{% endblock %}

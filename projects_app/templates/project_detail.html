<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project.title }} | Portfolio Detail</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 6rem 2rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--primary);
            text-decoration: none;
            margin-bottom: 2rem;
            font-weight: 600;
            transition: transform 0.3s ease;
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        .tech-stack {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 3rem;
        }

        .tech-tag {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 0.4rem 1rem;
            border-radius: 99px;
            font-size: 0.9rem;
            color: var(--primary);
        }

        .content {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .actions {
            display: flex;
            gap: 1.5rem;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 15px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            text-align: center;
            flex: 1;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-outline {
            border: 2px solid var(--glass-border);
            color: var(--text-main);
        }

        .btn-outline:hover {
            background: var(--glass);
            border-color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="/projects/" class="back-link">← Back to Overview</a>

        <h1>{{ project.title }}</h1>

        <div class="tech-stack">
            {% for tech in project.tech_stack.split %}
            <span class="tech-tag">{{ tech }}</span>
            {% endfor %}
        </div>

        <div class="content">
            {{ project.description|linebreaks }}
        </div>

        <div class="actions">
            {% if project.live_demo %}
            <a href="{{ project.live_demo }}" target="_blank" class="btn btn-primary">Live Demo</a>
            {% endif %}
            {% if project.github_link %}
            <a href="{{ project.github_link }}" target="_blank" class="btn btn-outline">Source Code</a>
            {% endif %}
        </div>
    </div>
</body>

</html>
